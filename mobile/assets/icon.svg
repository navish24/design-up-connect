<svg viewBox="0 0 100 100" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: jade-grey accent, iOS-style rounded square -->
  <rect width="100" height="100" rx="22" fill="#6A9888"/>

  <!--
    Single C — visually centred on the canvas.
    Arc center at (53, 50), radius 24, gap ±40° facing east.
    cos40°≈0.766  sin40°≈0.643
    Start : (53 + 24·cos40°, 50 − 24·sin40°) = (71.4, 34.6)
    End   : (71.4, 65.4)
    Sweep=0 (CCW), large-arc=1  →  320° arc
  -->
  <path
    d="M 71.4,34.6 A 24,24 0 1,0 71.4,65.4"
    fill="none"
    stroke="white"
    stroke-width="12"
    stroke-linecap="round"
  />
</svg>
