<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#00B4B4" />

    <title>Designup Connect</title>
    <meta name="description" content="Your digital visiting card and networking companion." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA: full-screen, icon, splash -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Connect" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />

    <!-- Prevent phone number auto-linking on iOS -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Preload Ionicons so icons render immediately (no □ placeholders) -->
    <link rel="preload" as="font" type="font/ttf" crossorigin href="/Ionicons.ttf" />
    <style>
      /* Root fills the dynamic viewport — excludes Safari's floating bottom bar */
      html, body {
        height: 100%; margin: 0; padding: 0;
        touch-action: manipulation;
        overflow: hidden;              /* prevent body-level scroll on iOS PWA */
        overscroll-behavior: none;     /* disable rubber-band bounce */
      }
      #root {
        height: 100dvh;        /* modern: dynamic viewport, clips below Safari bar */
        overflow: hidden;
      }
      /* Fallback chain for older Safari that lacks dvh */
      @supports not (height: 100dvh) {
        #root { height: 100svh; }   /* small viewport height — next best thing */
      }
      @supports not (height: 100svh) {
        #root { height: -webkit-fill-available; min-height: -webkit-fill-available; }
      }

      @font-face {
        font-family: 'Ionicons';
        src: url('/Ionicons.ttf') format('truetype');
        font-display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
